<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="FREEDITION — current AFL, cricket, MLB, NBA, NBL, NFL, NHL and soccer headlines in one simple feed.">
  <meta name="theme-color" content="#f4f5f7">
  <title>FREEDITION — Free Sports News</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <a class="logo" href="#" aria-label="FREEDITION home"><span class="logo-mark"><b>F</b><i></i></span><span>FREEDITION</span></a>
    <nav aria-label="Filter stories by sport">
      <button class="active" data-sport="all">ALL</button>
      <button data-sport="favorites" aria-label="My favourite players" title="My players">★</button>
      <button data-sport="afl">AFL</button>
      <button data-sport="cricket">ICC</button>
      <button data-sport="mlb">MLB</button>
      <button data-sport="nba">NBA</button>
      <button data-sport="nbl">NBL</button>
      <button data-sport="nfl">NFL</button>
      <button data-sport="nhl">NHL</button>
      <button data-sport="soccer">SOCCER</button>
    </nav>
  </header>

  <main>
    <div class="feed-heading">
      <h1>LATEST <small id="story-count"></small></h1>
      <span id="updated"></span>
    </div>
    <div class="browse-tools">
      <div id="kind-filters" aria-label="Filter stories by type">
        <button class="active" type="button" data-kind="all">ALL</button>
        <button type="button" data-kind="player">PLAYER NEWS</button>
        <button type="button" data-kind="fantasy">FANTASY</button>
      </div>
      <div class="read-tools">
        <label><input id="hide-read" type="checkbox"> HIDE READ</label>
        <button id="mark-read" type="button">MARK ALL READ</button>
      </div>
    </div>
    <section id="player-picker" hidden aria-label="My players">
      <p>Go to PLAYER NEWS and star players to see their updates here.</p>
      <div id="saved-players"></div>
    </section>
    <div id="feed" aria-live="polite"></div>
    <p id="empty" hidden>No current stories found.</p>
  </main>

  <div id="news-toast" class="news-toast" role="status" aria-live="polite" hidden>
    <span></span>
    <button type="button" aria-label="Dismiss notification">×</button>
  </div>

  <script src="stories.js"></script>
  <script>
    const feed = document.querySelector('#feed');
    const empty = document.querySelector('#empty');
    const buttons = [...document.querySelectorAll('nav button')];
    let data = window.SPORTS_FEED || { updatedAt: null, stories: [] };
    const toast = document.querySelector('#news-toast');
    const playerPicker = document.querySelector('#player-picker');
    const savedPlayers = document.querySelector('#saved-players');
    const kindButtons = [...document.querySelectorAll('#kind-filters button')];
    const hideReadInput = document.querySelector('#hide-read');
    const markReadButton = document.querySelector('#mark-read');
    const storyCount = document.querySelector('#story-count');
    const favoriteStorageKey = 'freedition.favoritePlayers';
    const readStorageKey = 'freedition.readStories';
    const kindStorageKey = 'freedition.kindFilter';
    const hideReadStorageKey = 'freedition.hideRead';
    const feedCacheKey = 'freedition.cachedFeed';
    const feedCacheTimeKey = 'freedition.cachedFeedTime';
    const feedCacheMs = 15 * 60 * 1000;
    let favoritePlayers = [];
    let readStories = new Set();
    let previousStories = new Set();
    let currentSport = 'all';
    let currentKind = 'all';
    let hideRead = false;
    let favoriteFilter = 'all';

    function playerKey(sport, name) {
      return `${sport}|${name.toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim()}`;
    }

    function isFavorite(sport, name) {
      const key = playerKey(sport, name);
      return favoritePlayers.some(player => playerKey(player.sport, player.name) === key);
    }

    function storyMatchesFavorites(story) {
      const names = story.players || [];
      const text = `${story.title} ${story.summary || ''}`.toLowerCase();
      return favoritePlayers.some(player => (favoriteFilter === 'all' || playerKey(player.sport, player.name) === favoriteFilter) &&
        player.sport === story.sport &&
        (names.some(name => playerKey(story.sport, name) === playerKey(player.sport, player.name)) ||
         text.includes(player.name.toLowerCase())));
    }

    function saveFavorites() {
      try { localStorage.setItem(favoriteStorageKey, JSON.stringify(favoritePlayers)); } catch (error) {}
    }

    function renderSavedPlayers() {
      if (favoritePlayers.length < 2) {
        favoriteFilter = 'all';
        savedPlayers.replaceChildren();
        return;
      }
      const filters = [{ sport: '', name: 'ALL', key: 'all' }, ...favoritePlayers.map(player => ({
        ...player, key: playerKey(player.sport, player.name)
      }))];
      if (!filters.some(player => player.key === favoriteFilter)) favoriteFilter = 'all';
      savedPlayers.replaceChildren(...filters.map(player => {
        const button = document.createElement('button');
        button.type = 'button';
        button.classList.toggle('active', player.key === favoriteFilter);
        button.textContent = player.key === 'all' ? 'ALL' : `${player.name} · ${player.sport.toUpperCase()}`;
        button.addEventListener('click', () => {
          favoriteFilter = player.key;
          render('favorites');
        });
        return button;
      }));
    }

    function ago(value) {
      const minutes = Math.max(1, Math.floor((Date.now() - new Date(value).getTime()) / 60000));
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    function saveReadStories() {
      try { localStorage.setItem(readStorageKey, JSON.stringify([...readStories].slice(-1000))); } catch (error) {}
    }

    function markStoryRead(url) {
      readStories.add(url);
      saveReadStories();
    }

    function baseStories(sport = currentSport) {
      return data.stories.filter(story =>
        (sport === 'all' || (sport === 'favorites' ? storyMatchesFavorites(story) : story.sport === sport)) &&
        (currentKind === 'all' || story.kind === currentKind));
    }

    function render(sport = 'all') {
      currentSport = sport;
      playerPicker.hidden = sport !== 'favorites';
      if (sport === 'favorites') renderSavedPlayers();
      const matchingStories = baseStories(sport);
      const stories = hideRead ? matchingStories.filter(story => !readStories.has(story.url)) : matchingStories;
      storyCount.textContent = `(${stories.length})`;
      let dividerAdded = false;
      const nodes = [];
      stories.forEach(story => {
        if (!dividerAdded && previousStories.size && !previousStories.has(story.url)) {
          const divider = document.createElement('div');
          divider.className = 'new-divider';
          divider.textContent = 'NEW SINCE YOUR LAST VISIT';
          nodes.push(divider);
          dividerAdded = true;
        }
        const article = document.createElement('article');
        article.className = `story-${story.sport}`;
        if (readStories.has(story.url)) article.classList.add('is-read');
        else article.classList.add('is-unread');
        const label = document.createElement('span');
        const content = document.createElement('div');
        const title = document.createElement('h2');
        const link = document.createElement('a');
        const details = document.createElement('p');
        const actions = document.createElement('div');
        const view = document.createElement('a');
        const share = document.createElement('button');
        label.className = `sport ${story.sport}`;
        label.textContent = story.sport.toUpperCase();
        link.href = story.url;
        link.target = '_blank';
        link.rel = 'noreferrer';
        link.textContent = story.title;
        link.addEventListener('click', () => markStoryRead(story.url));
        title.append(link);
        if (story.summary) {
          const summary = document.createElement('div');
          summary.className = 'summary';
          summary.textContent = story.summary;
          content.append(title, summary);
        } else content.append(title);
        details.textContent = `${story.source} · ${ago(story.publishedAt)}`;
        content.append(details);
        actions.className = 'story-actions';
        view.href = story.url;
        view.target = '_blank';
        view.rel = 'noreferrer';
        view.setAttribute('aria-label', `View ${story.title}`);
        view.textContent = 'VIEW';
        view.addEventListener('click', () => markStoryRead(story.url));
        share.type = 'button';
        share.setAttribute('aria-label', `Share ${story.title}`);
        share.textContent = 'SHARE';
        share.addEventListener('click', async () => {
          if (navigator.share) {
            try { await navigator.share({ title: story.title, url: story.url }); }
            catch (error) { if (error.name !== 'AbortError') showToast('Could not share this story'); }
          } else {
            try {
              await navigator.clipboard.writeText(story.url);
              showToast('Story link copied');
            } catch (error) { showToast('Could not copy the story link'); }
          }
        });
        actions.append(view, share);
        if (story.players && story.players.length) {
          const player = story.players[0];
          const favorite = document.createElement('button');
          const selected = isFavorite(story.sport, player);
          favorite.type = 'button';
          favorite.className = `favorite${selected ? ' is-favorite' : ''}`;
          favorite.textContent = selected ? '★' : '☆';
          favorite.setAttribute('aria-label', `${selected ? 'Remove' : 'Favourite'} ${player}`);
          favorite.title = `${selected ? 'Remove' : 'Favourite'} ${player}`;
          favorite.addEventListener('click', () => {
            if (isFavorite(story.sport, player)) {
              const key = playerKey(story.sport, player);
              favoritePlayers = favoritePlayers.filter(item => playerKey(item.sport, item.name) !== key);
              showToast(`${player} removed from favourites`);
            } else {
              favoritePlayers.push({ sport: story.sport, name: player });
              showToast(`${player} favourited`);
            }
            saveFavorites();
            const active = buttons.find(button => button.classList.contains('active'));
            render(active ? active.dataset.sport : 'all');
          });
          actions.append(favorite);
        }
        article.append(label, content, actions);
        nodes.push(article);
      });
      feed.replaceChildren(...nodes);
      empty.textContent = sport === 'favorites'
        ? (favoritePlayers.length ? 'No current news for your favourite players.' : 'Star a player to build your personal feed.')
        : 'No current stories found.';
      empty.hidden = stories.length > 0;
    }

    const filterStorageKey = 'freedition.sportFilter';

    buttons.forEach(button => button.addEventListener('click', () => {
      buttons.forEach(item => item.classList.remove('active'));
      button.classList.add('active');
      try { localStorage.setItem(filterStorageKey, button.dataset.sport); } catch (error) {}
      render(button.dataset.sport);
    }));

    kindButtons.forEach(button => button.addEventListener('click', () => {
      currentKind = button.dataset.kind;
      kindButtons.forEach(item => item.classList.toggle('active', item === button));
      try { localStorage.setItem(kindStorageKey, currentKind); } catch (error) {}
      render(currentSport);
    }));

    hideReadInput.addEventListener('change', () => {
      hideRead = hideReadInput.checked;
      try { localStorage.setItem(hideReadStorageKey, hideRead ? '1' : '0'); } catch (error) {}
      render(currentSport);
    });

    markReadButton.addEventListener('click', () => {
      baseStories().forEach(story => readStories.add(story.url));
      saveReadStories();
      showToast('Matching stories marked as read');
      render(currentSport);
    });

    function updateTimestamp() {
      document.querySelector('#updated').textContent = data.updatedAt
        ? `UPDATED ${ago(data.updatedAt).toUpperCase()}`
        : 'AWAITING FIRST UPDATE';
    }

    let toastTimer;
    function showToast(message, duration = 4000) {
      window.clearTimeout(toastTimer);
      toast.querySelector('span').textContent = message;
      toast.hidden = false;
      requestAnimationFrame(() => toast.classList.add('show'));
      toastTimer = window.setTimeout(() => toast.classList.remove('show'), duration);
    }

    function showNewStoriesToast() {
      const storageKey = 'freedition.seenStories';
      const current = data.stories.map(story => story.url);
      let previous = [];
      try { previous = JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch (error) {}
      previousStories = new Set(previous);
      if (previous.length) {
        const seen = new Set(previous);
        const count = current.filter(url => !seen.has(url)).length;
        if (count) {
          showToast(`${count} new ${count === 1 ? 'story' : 'stories'} since your last visit`, 6000);
        }
      }
      try { localStorage.setItem(storageKey, JSON.stringify(current)); } catch (error) {}
    }

    toast.querySelector('button').addEventListener('click', () => toast.classList.remove('show'));
    toast.addEventListener('transitionend', () => {
      if (!toast.classList.contains('show')) toast.hidden = true;
    });
    async function boot() {
      if (!['', 'localhost', '127.0.0.1'].includes(location.hostname)) {
        try {
          const cached = JSON.parse(localStorage.getItem(feedCacheKey) || 'null');
          const cachedAt = Number(localStorage.getItem(feedCacheTimeKey) || 0);
          if (cached && Array.isArray(cached.stories)) data = cached;
          if (!cached || Date.now() - cachedAt >= feedCacheMs) {
            const response = await fetch('https://raw.githubusercontent.com/ahill85/freedition/main/stories.json');
            if (response.ok) {
              data = await response.json();
              localStorage.setItem(feedCacheKey, JSON.stringify(data));
              localStorage.setItem(feedCacheTimeKey, String(Date.now()));
            }
          }
        } catch (error) {}
      }
      try {
        const stored = JSON.parse(localStorage.getItem(favoriteStorageKey) || '[]');
        if (Array.isArray(stored)) favoritePlayers = stored.filter(player => player && player.sport && player.name);
      } catch (error) {}
      try {
        const stored = JSON.parse(localStorage.getItem(readStorageKey) || '[]');
        if (Array.isArray(stored)) readStories = new Set(stored);
        currentKind = localStorage.getItem(kindStorageKey) || 'all';
        hideRead = localStorage.getItem(hideReadStorageKey) === '1';
      } catch (error) {}
      hideReadInput.checked = hideRead;
      const savedKindButton = kindButtons.find(button => button.dataset.kind === currentKind) || kindButtons[0];
      currentKind = savedKindButton.dataset.kind;
      kindButtons.forEach(button => button.classList.toggle('active', button === savedKindButton));
      let savedSport = 'all';
      try { savedSport = localStorage.getItem(filterStorageKey) || 'all'; } catch (error) {}
      const savedButton = buttons.find(button => button.dataset.sport === savedSport) || buttons[0];
      buttons.forEach(button => button.classList.toggle('active', button === savedButton));
      updateTimestamp();
      showNewStoriesToast();
      render(savedButton.dataset.sport);
    }
    boot();
  </script>
</body>
</html>
